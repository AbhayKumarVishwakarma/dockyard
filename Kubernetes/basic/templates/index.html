<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes basic</title>
</head>
<body>
    <h1>Welcome to Kubernetes basic</h1>
    <!-- print value of environment variable in loop -->
    {% for key, value in env.items() %}
        <p>{{ key }}: {{ value }}</p>
    {% endfor %}
</body>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
        background-color: rgb(248, 220, 185);
    }
</style>
</html>
